<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: #f5f7fb;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.94) !important;
            box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-grid;
            place-items: center;
            background: #0d6efd;
            color: #fff;
            font-weight: 700;
        }

        .profile-label {
            color: #6c757d;
            font-size: 14px;
        }

        .profile-table {
            max-width: 720px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
                <span class="brand-mark">S</span>
                <span>Student App</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./student.html">Students</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./profile.html">Profile</a>
                    </li>
                </ul>
                <button class="btn btn-outline-danger" id="logoutBtn" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">

        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="mb-1">Profile</h1>
                <p class="text-secondary mb-0">Account ma'lumotlari</p>
            </div>
            <button class="btn btn-primary align-self-md-start" id="editProfileBtn" type="button">Edit</button>
        </div>

        <div class="alert d-none" id="message" role="alert"></div>

        <table class="table table-striped profile-table">
            <tbody>
                <tr>
                    <th scope="row" class="profile-label">Full name</th>
                    <td class="fw-semibold" id="profileName">Loading...</td>
                </tr>
                <tr>
                    <th scope="row" class="profile-label">Email</th>
                    <td class="fw-semibold" id="profileEmail">Loading...</td>
                </tr>
                <tr>
                    <th scope="row" class="profile-label">Age</th>
                    <td class="fw-semibold" id="profileAge">-</td>
                </tr>
                <tr>
                    <th scope="row" class="profile-label">User ID</th>
                    <td class="fw-semibold text-break" id="profileId">-</td>
                </tr>
            </tbody>
        </table>
    </main>

    <div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="profileForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="profileModalLabel">Edit profile</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="fullName">Full name</label>
                            <input class="form-control" id="fullName" type="text" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" type="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="age">Age</label>
                            <input class="form-control" id="age" type="number" required>
                        </div>
                        <div class="mb-0">
                            <label class="form-label" for="password">New password</label>
                            <input class="form-control" id="password" type="password" placeholder="Optional">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const token = localStorage.getItem('token');
        const profileModal = new bootstrap.Modal(document.getElementById('profileModal'));
        const message = document.getElementById('message');
        let currentUser = null;

        if (!token) {
            window.location.href = './login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = './login.html';
        });

        document.getElementById('editProfileBtn').addEventListener('click', () => {
            if (!currentUser) {
                return;
            }

            document.getElementById('fullName').value = currentUser.full_name;
            document.getElementById('email').value = currentUser.email;
            document.getElementById('age').value = currentUser.age;
            document.getElementById('password').value = '';
            profileModal.show();
        });

        document.getElementById('profileForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            await updateProfile();
        });

        function headers() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        function showMessage(text, type = 'success') {
            message.textContent = text;
            message.className = `alert alert-${type}`;
            setTimeout(() => {
                message.className = 'alert d-none';
            }, 2500);
        }

        function renderProfile(user) {
            document.getElementById('profileName').textContent = user.full_name;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profileId').textContent = user.id;
            document.getElementById('profileAge').textContent = user.age;
        }

        async function getUserProfile() {
            try {
                const response = await fetch('http://localhost:3000/api/user/profile', {
                    method: 'GET',
                    headers: headers()
                });

                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = './login.html';
                    return;
                }

                const user = await response.json();
                if (!response.ok) {
                    throw new Error(user.message || 'Failed to fetch user profile');
                }

                currentUser = user.user || user;
                renderProfile(currentUser);
            } catch (error) {
                showMessage(error.message || "Server bilan aloqa yo'q", 'danger');
            }
        }

        async function updateProfile() {
            const password = document.getElementById('password').value;
            const userData = {
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                age: document.getElementById('age').value
            };

            if (password) {
                userData.password = password;
            }

            try {
                const response = await fetch(`http://localhost:3000/api/user/${currentUser.id}`, {
                    method: 'PUT',
                    headers: headers(),
                    body: JSON.stringify(userData)
                });
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || 'Update failed');
                }

                currentUser = result.user || result;
                renderProfile(currentUser);
                profileModal.hide();
                showMessage('Profile updated successfully');
            } catch (error) {
                showMessage(error.message || 'Update failed', 'danger');
            }
        }

        getUserProfile();
    </script>
</body>

</html>
