<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: #f5f7fb;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.94) !important;
            box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-grid;
            place-items: center;
            background: #0d6efd;
            color: #fff;
            font-weight: 700;
        }

        .hero-panel,
        .stat-card,
        .quick-card {
            border: 0;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
        }

        .hero-panel {
            background: #fff;
        }

        .stat-value {
            font-size: 34px;
            font-weight: 700;
            line-height: 1;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
                <span class="brand-mark">S</span>
                <span>Student App</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./student.html">Students</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./profile.html">Profile</a>
                    </li>
                </ul>
                <button class="btn btn-outline-danger" id="logoutBtn" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container py-4 py-lg-5">
        <section class="hero-panel p-4 p-lg-5 mb-4">
            <div class="row align-items-center g-4">
                <div class="col-lg-7">
                    <p class="text-primary fw-semibold mb-2">Dashboard</p>
                    <h1 class="display-6 fw-bold mb-3">Students va profilingizni bitta joydan boshqaring</h1>
                    <p class="text-secondary mb-4">
                        Studentlar ro'yxati, qidiruv, qo'shish, update va delete amallari tayyor.
                    </p>
                    <div class="d-flex flex-wrap gap-2">
                        <a class="btn btn-primary" href="./student.html">Open students</a>
                        <a class="btn btn-outline-secondary" href="./profile.html">View profile</a>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="stat-card bg-white p-4">
                                <div class="profile-label text-secondary mb-2">Students</div>
                                <div class="stat-value" id="studentsCount">-</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="stat-card bg-white p-4">
                                <div class="profile-label text-secondary mb-2">Account</div>
                                <div class="stat-value">1</div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="quick-card bg-white p-4">
                                <div class="text-secondary small mb-1">Signed in as</div>
                                <div class="fw-semibold" id="currentUser">Loading...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = './login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = './login.html';
        });

        function headers() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        async function loadDashboard() {
            try {
                const [profileResponse, studentsResponse] = await Promise.all([
                    fetch('http://localhost:3000/api/user/profile', { headers: headers() }),
                    fetch('http://localhost:3000/api/students', { headers: headers() })
                ]);

                if (profileResponse.status === 401 || studentsResponse.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = './login.html';
                    return;
                }

                const profile = await profileResponse.json();
                const students = await studentsResponse.json();
                const user = profile.user || profile;

                document.getElementById('currentUser').textContent = user.full_name || user.email;
                document.getElementById('studentsCount').textContent = (students.data || []).length;
            } catch (error) {
                document.getElementById('currentUser').textContent = "Server bilan aloqa yo'q";
                document.getElementById('studentsCount').textContent = '-';
            }
        }

        loadDashboard();
    </script>
</body>

</html>
