<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f5f5f5;
            color: #111;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .page-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
        }

        .product-image {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 10px;
        }

        .summary-value {
            font-weight: 700;
        }

        .discount-value {
            color: #dc3545;
            text-decoration: line-through;
        }

        .final-value {
            color: #198754;
            font-size: 18px;
        }

        .dark {
            background-color: #111;
            color: #fff;
        }

        .dark .table {
            color: #fff;
        }

        .dark .table-bordered {
            border-color: #505050;
        }

        .dark .table-light,
        .dark .table-success {
            --bs-table-bg: #1b1b1b;
            --bs-table-color: #fff;
            --bs-table-border-color: #505050;
        }

        .dark #emptyMessage {
            color: #cfcfcf !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="py-5">
            <h1 class="text-center mb-4">Your Shopping Cart</h1>
            <div class="page-actions">
                <button class="btn btn-secondary" onclick="goBack()">⬅️ Ortga</button>
                <button id="themeToggleBtn" class="btn btn-outline-dark" onclick="toggleTheme()">🌙 Dark mode</button>
                <a href="index.html" class="btn btn-primary">🛍️ Mahsulotlarga qaytish</a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>T/r</th>
                            <th>Nomi</th>
                            <th>Rasmi</th>
                            <th>Soni</th>
                            <th>Narxi</th>
                        </tr>
                    </thead>
                    <tbody id="cartTableBody"></tbody>
                    <tfoot>
                        <tr class="table-light">
                            <th colspan="4" class="text-end">Umumiy narx</th>
                            <th id="totalPrice" class="summary-value">$0</th>
                        </tr>
                        <tr class="table-light">
                            <th colspan="4" class="text-end">Discount 10%</th>
                            <th id="discountPrice" class="summary-value discount-value">$0</th>
                        </tr>
                        <tr class="table-success">
                            <th colspan="4" class="text-end">Final price</th>
                            <th id="finalPrice" class="summary-value final-value">$0</th>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <p id="emptyMessage" class="text-center text-muted d-none">Savat hozircha bo'sh.</p>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartTableBody = document.getElementById("cartTableBody");
        const emptyMessage = document.getElementById("emptyMessage");
        const totalPrice = document.getElementById("totalPrice");
        const discountPrice = document.getElementById("discountPrice");
        const finalPrice = document.getElementById("finalPrice");

        function updateThemeButton(theme) {
            const themeToggleBtn = document.getElementById("themeToggleBtn");
            themeToggleBtn.textContent = theme === "dark" ? "☀️ Light mode" : "🌙 Dark mode";
            themeToggleBtn.className = theme === "dark" ? "btn btn-outline-light" : "btn btn-outline-dark";
        }

        function setTheme(theme) {
            document.body.classList.remove("light", "dark");
            document.body.classList.add(theme);
            localStorage.setItem("theme", theme);
            updateThemeButton(theme);
        }

        function toggleTheme() {
            const currentTheme = document.body.classList.contains("dark") ? "dark" : "light";
            const nextTheme = currentTheme === "dark" ? "light" : "dark";
            setTheme(nextTheme);
        }

        function goBack() {
            window.history.back();
        }

        function saveCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function renderCart() {
            if (!cart.length) {
                emptyMessage.classList.remove("d-none");
                cartTableBody.innerHTML = "";
                totalPrice.textContent = "$0";
                discountPrice.textContent = "$0";
                finalPrice.textContent = "$0";
                return;
            }

            emptyMessage.classList.add("d-none");
            let cartHtml = "";
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                cartHtml += `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="product-name">${item.name}</td>
                        <td>
                            <img src="${item.image}" alt="${item.name}" class="product-image">
                        </td>
                        <td>
                            <div class="d-flex justify-content-center align-items-center gap-2">
                                <button class="btn btn-sm btn-outline-danger" onclick="changeQuantity(${index}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="btn btn-sm btn-outline-success" onclick="changeQuantity(${index}, 1)">+</button>
                            </div>
                        </td>
                        <td class="fw-bold">$${item.price}</td>
                    </tr>
                `;
            });

            let discount = total * 0.1;
            let final = total - discount;

            cartTableBody.innerHTML = cartHtml;
            totalPrice.textContent = `$${total}`;
            discountPrice.textContent = `-$${discount}`;
            finalPrice.textContent = `$${final}`;
        }

        function changeQuantity(index, amount) {
            cart[index].quantity += amount;

            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }

            saveCart();
            renderCart();
        }

        setTheme(localStorage.getItem("theme") || "light");
        renderCart();
    </script>
</body>

</html>
