<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <style>
    body {
      background-color: #f5f5f5;
      color: #111;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .page-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .active {
      background-color: #000;
      border-color: #000;
      color: #fff;
    }

    .cart-link {
      text-decoration: none;
    }

    .dark {
      background-color: #111;
      color: #fff;
    }

    .dark .category .btn {
      color: #fff;
      border-color: #fff;
    }

    .dark .card {
      background-color: #1b1b1b;
      color: #fff;
      border: 1px solid #505050;
    }

    .dark .form-control {
      background-color: #1b1b1b;
      color: #fff;
      border-color: #505050;
    }

    .dark .form-control::placeholder {
      color: #bdbdbd;
    }

    .light {
      background-color: #f5f5f5;
      color: #111;
    }

    .light .card {
      background-color: #fff;
      color: #111;
      border-color: #d0d0d0;
    }
  </style>
</head>

<body>
  <div class="container-fluid">
    <h1 class="text-center">Mahsulotlar</h1>
    <div class="my-3 page-actions">
      <button id="themeToggleBtn" class="btn btn-outline-dark" onclick="toggleTheme()">🌙 Dark mode</button>
      <a href="cart.html" class="btn btn-primary cart-link">🛒 Savatcha</a>
    </div>
    <div>
      <input type="text" class="form-control" id="input" placeholder="Mahsulotni kiriting..." />
    </div>

    <div class="my-3 category">
      <button class="btn btn-outline-primary active" onclick="setCategory('all')">All</button>
      <button class="btn btn-outline-primary" onclick="setCategory('laptop')">Laptop</button>
      <button class="btn btn-outline-primary" onclick="setCategory('phone')">Phone</button>
      <button class="btn btn-outline-primary" onclick="setCategory('accessory')">Accessuary</button>
    </div>

    <div class="row" id="products"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
